<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Security Scan Report | Dashboard</title>
    <link rel="stylesheet" href="../static/css/dashboard.css">
    <script src="../static/js/dashboard.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>

<body>

    <header class="main-header">
        <nav class="navbar">
            <div class="nav-left">
                <h1>WebSec<span>Scanner</span></h1>
                <span class="report-tag">Executive Report</span>
            </div>
            <div class="nav-right">
                <a href="index.html" class="btn-outline">Home</a>
                <a href="scan.html" class="btn-outline">New Scan</a>
                <a href="history.html" class="btn-outline">History</a>
                <button onclick="generatePDF()" class="btn-primary">Download PDF Report</button>
            </div>
        </nav>
    </header>

    <div class="container" id="report-content">

        <div class="report-header">
            <h2>Vulnerability Assessment Summary</h2>
            <p id="targetUrl">Target: Loading...</p>
        </div>

        <div class="stats-grid">
            <div class="stat-item total">
                <label>Total Findings</label>
                <span id="totalVulns">0</span>
            </div>
            <div class="stat-item critical">
                <label>Critical Risk</label>
                <span id="critical">0</span>
            </div>
            <div class="stat-item high">
                <label>High Risk</label>
                <span id="high">0</span>
            </div>
            <div class="stat-item medium">
                <label>Medium Risk</label>
                <span id="medium">0</span>
            </div>
        </div>

        <section class="findings-section">
            <h3>Detailed Findings</h3>
            <table class="vuln-table">
                <thead>
                    <tr>
                        <th>Risk Type</th>
                        <th>Affected Endpoint</th>
                        <th>Severity</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="results"></tbody>
            </table>
        </section>

    </div>

    <footer class="footer-minimal">
        <p>Generated by WebSec Scanner Engine</p>
    </footer>

    

</body>

</html>
